version: 2

builds:
  - main: .
    binary: coach
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: "coach_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: coach
    binary: coach
    repository:
      owner: martin-dimi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/martin-dimi/claude-coach
    description: Your personal wellness coach inside Claude Code

changelog:
  sort: asc
