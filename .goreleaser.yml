version: 2

builds:
  - main: .
    binary: coach
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "coach_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: fridge
      name: homebrew-tap
    name: coach
    homepage: https://github.com/fridge/coach
    description: Your personal wellness coach inside Claude Code
    license: MIT
    install: |
      bin.install "coach"

changelog:
  sort: asc
